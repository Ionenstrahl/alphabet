<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    >
    <title>Buchstaben Aussprache</title>
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="assets/images/favicon/apple-touch-icon.png"
    >
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="assets/images/favicon/favicon-32x32.png"
    >
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="assets/images/favicon/favicon-16x16.png"
    >
    <link rel="icon" href="assets/images/favicon/favicon.ico">
    <link rel="manifest" href="assets/images/favicon/site.webmanifest">
    <link
      rel="stylesheet"
      href="assets/vendor/fontawesome/css/fontawesome.min.css"
    >
    <link rel="stylesheet" href="assets/vendor/fontawesome/css/solid.min.css">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app">
      <section class="overview" aria-label="Kartenubersicht">
        <div id="overview-content"></div>
      </section>

      <footer class="app-footer" aria-label="Impressum">
        <p>
          &copy; Copyright 2026 &ndash; Alle Inhalte sind urheberrechtlich
          gesch&uuml;tzt. Alle Rechte, einschlie&szlig;lich der
          Vervielf&auml;ltigung, Ver&ouml;ffentlichung, Bearbeitung und
          &Uuml;bersetzung, bleiben vorbehalten, Carl-Sonnenschein-Haus e.V.
        </p>
      </footer>
    </main>

    <section
      id="card-screen"
      class="card-screen hidden"
      aria-hidden="true"
      aria-label="Karte"
    >
      <button
        id="close-button"
        class="icon-button close-button"
        type="button"
        aria-label="Ubersicht offnen"
        title="Ubersicht"
      >
        <i class="fa-solid fa-xmark" aria-hidden="true"></i>
      </button>

      <div id="card-stage" class="card-stage">
        <button
          id="card-button"
          class="card-button"
          type="button"
          aria-label="Ton abspielen"
          title="Ton abspielen"
        >
          <img id="card-image" alt="">
        </button>
      </div>

      <div class="card-actions" aria-label="Kartenaktionen">
        <button
          id="random-button"
          class="icon-button random-button"
          type="button"
          aria-label="Zufallskarte"
          title="Zufallskarte"
        >
          <i class="fa-solid fa-shuffle" aria-hidden="true"></i>
        </button>

        <button
          id="next-button"
          class="icon-button"
          type="button"
          aria-label="Nachste Karte"
          title="Nachste Karte"
        >
          <i class="fa-solid fa-arrow-right" aria-hidden="true"></i>
        </button>
      </div>
    </section>

    <audio id="card-audio" preload="none"></audio>

    <script defer src="src/data/cardDefinitions.js"></script>
    <script defer src="src/utils/joinPath.js"></script>
    <script defer src="src/cards/buildCardRepository.js"></script>
    <script defer src="src/routing/cardHash.js"></script>
    <script defer src="src/ui/getElements.js"></script>
    <script defer src="src/ui/renderOverview.js"></script>
    <script defer src="src/ui/createCardScreenView.js"></script>
    <script defer src="src/app/createApp.js"></script>
    <script defer src="app.js"></script>
  </body>
</html>
